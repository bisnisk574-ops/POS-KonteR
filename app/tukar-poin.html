<div class="page-wrap">

      type="text"
      class="search-input"
      id="search-input"
      placeholder="Cari nama atau nomor telepon…"
      autocomplete="off"
    >

  </div>

  <div id="card-wrap"></div>

<!-- TOAST -->
<div class="toast" id="toast">
  <i class="fas fa-check-circle" style="color:#10b981;"></i>
  <span id="toast-msg">Berhasil!</span>
</div>

<script>
/* ─────────────────────────────────────────────
   HELPERS
───────────────────────────────────────────── */
const fmt  = n => Number(n||0).toLocaleString('id-ID');
const wait = ms => new Promise(r => setTimeout(r, ms));

function showToast(msg, icon = '✅') {
  const t = document.getElementById('toast');
  t.innerHTML = `<span style="font-size:16px;">${icon}</span><span id="toast-msg">${msg}</span>`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ─────────────────────────────────────────────
   TIER CONFIG  (mirror dari index utama)
───────────────────────────────────────────── */
const TIERS = [
  { nama:'Bronze',  min:0,    max:999,   color:'#cd7f32', bg:'rgba(205,127,50,0.15)',  icon:'🥉' },
  { nama:'Silver',  min:1000, max:4999,  color:'#94a3b8', bg:'rgba(148,163,184,0.15)', icon:'🥈' },
  { nama:'Gold',    min:5000, max:14999, color:'#f59e0b', bg:'rgba(245,158,11,0.15)',  icon:'🥇' },
  { nama:'Platinum',min:15000,max:Infinity,color:'#38bdf8',bg:'rgba(56,189,248,0.15)',icon:'💎' },
];
function getTier(poin) {
  return TIERS.find(t => poin >= t.min && poin <= t.max) || TIERS[0];
}

/* ─────────────────────────────────────────────
   FIREBASE – ambil data pelanggan
───────────────────────────────────────────── */
let pelangganList = [];
let currentUser   = null; // staff yg login

async function waitFirebase() {
  return new Promise(res => {
    const t = setInterval(() => {
      if (window._db) { clearInterval(t); res(); }
    }, 80);
  });
}

async function loadPelanggan(storeId) {
  if (!storeId) return;

  // ── Cara 1: sub-koleksi pelanggan (pola lama) ──
  const snap = await window._db.collection('stores').doc(storeId)
    .collection('pelanggan').get().catch(() => null);
  if (snap && !snap.empty) {
    pelangganMode = 'subcol';
    pelangganList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    return;
  }

  // ── Cara 2: pelanggan tersimpan sebagai array di dalam dokumen utama (pola index.html) ──
  const doc = await window._db.collection('stores').doc(storeId)
    .get().catch(() => null);
  if (doc && doc.exists) {
    const data = doc.data();
    const arr = data.pelanggan || (data.db && data.db.pelanggan) || [];
    pelangganMode = 'array';
    pelangganList = arr.map((c, i) => ({ id: c.id || String(i), ...c }));
    return;
  }

  // ── Cara 3: coba dari koleksi user_stores ──
  const doc2 = await window._db.collection('user_stores').doc(storeId)
    .get().catch(() => null);
  if (doc2 && doc2.exists) {
    const data2 = doc2.data();
    const arr2 = data2.pelanggan || (data2.db && data2.db.pelanggan) || [];
    pelangganMode = 'user_stores';
    pelangganList = arr2.map((c, i) => ({ id: c.id || String(i), ...c }));
  }
}

/* Cari storeId dari user yg login — disesuaikan dengan struktur Firestore index.html */
async function getStoreId(uid) {
  // ── Cara 1: stores/{uid} langsung (pola utama index.html) ──
  const direct = await window._db.collection('stores').doc(uid)
    .get().catch(() => null);
  if (direct && direct.exists) return uid;

  // ── Cara 2: user_stores dengan field owner_uid (pola multi-toko index.html) ──
  const snap = await window._db.collection('user_stores')
    .where('owner_uid', '==', uid).limit(1).get().catch(() => null);
  if (snap && !snap.empty) return snap.docs[0].id;

  // ── Cara 3: stores dengan field ownerUid (pola lama, fallback) ──
  const snap2 = await window._db.collection('stores')
    .where('ownerUid', '==', uid).limit(1).get().catch(() => null);
  if (snap2 && !snap2.empty) return snap2.docs[0].id;

  // ── Cara 4: cek sebagai staff ──
  const snap3 = await window._db.collection('stores')
    .where('staffUids', 'array-contains', uid).limit(1).get().catch(() => null);
  if (snap3 && !snap3.empty) return snap3.docs[0].id;

  return null;
}

/* ─────────────────────────────────────────────
   SEARCH
───────────────────────────────────────────── */
const searchInput   = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (q.length < 1) { searchResults.classList.remove('open'); return; }

  const filtered = pelangganList.filter(c =>
    (c.nama  || '').toLowerCase().includes(q) ||
    (c.phone || '').replace(/\D/g,'').includes(q.replace(/\D/g,''))
  ).slice(0, 8);

  if (filtered.length === 0) {
    searchResults.innerHTML = `<div class="search-item" style="cursor:default;opacity:.5;">
      <span style="font-size:12px;font-weight:700;color:#64748b;">Pelanggan tidak ditemukan</span>
    </div>`;
    searchResults.classList.add('open');
    return;
  }

  searchResults.innerHTML = filtered.map(c => {
    const poin  = Number(c.poin || 0);
    const tier  = getTier(poin);
    const inisial = (c.nama||'?')[0].toUpperCase();
    return `<div class="search-item" onclick="pilihPelanggan('${c.id}')">
      <div class="si-avatar">${inisial}</div>
      <div>
        <div class="si-name">${c.nama || '-'}</div>
        <div class="si-meta">${c.phone || 'No telepon'} · ${tier.icon} ${tier.nama}</div>
      </div>
      <div class="si-poin">${fmt(poin)} pts</div>
    </div>`;
  }).join('');
  searchResults.classList.add('open');
});

document.addEventListener('click', e => {
  if (!document.getElementById('search-wrap').contains(e.target)) {
    searchResults.classList.remove('open');
  }
});

/* ─────────────────────────────────────────────
   PILIH PELANGGAN → render kartu
───────────────────────────────────────────── */
let selectedId    = null;
let pelangganMode = 'subcol'; // 'subcol' | 'array' | 'user_stores'
let storeId    = null;

function pilihPelanggan(id) {
  searchResults.classList.remove('open');
  const c = pelangganList.find(x => x.id === id);
  if (!c) return;
  selectedId = id;
  searchInput.value = c.nama || '';
  renderKartu(c);
}

function renderKartu(c) {
  const poin    = Number(c.poin || 0);
  const tier    = getTier(poin);
  const tierNext= TIERS[TIERS.indexOf(tier) + 1] || null;

  // Progress ke tier berikutnya
  let progressPct = 100;
  let progressMsg = `🏆 Tier tertinggi!`;
  let progressColor = tier.color;
  if (tierNext) {
    progressPct = Math.min(100, Math.round(((poin - tier.min) / (tierNext.min - tier.min)) * 100));
    progressMsg = `${fmt(tierNext.min - poin)} poin lagi menuju ${tierNext.icon} ${tierNext.nama}`;
  }

  // Nilai konversi (default 100 poin = Rp 1.000)
  const nilaiPer100  = 1000; // bisa dibaca dari Firestore config
  const nilaiDiskon  = Math.floor(poin / 100) * nilaiPer100;
  const poinTukar    = Math.floor(poin / 100) * 100;
  const bisaTukar    = poin >= 100;

  // Riwayat penukaran (dari array redeemHistory jika ada)
  const riwayat = (c.redeemHistory || []).slice(-10).reverse();
  const riwayatHtml = riwayat.length === 0
    ? `<div class="empty-state"><div class="empty-icon">🎁</div><div class="empty-text">Belum ada riwayat penukaran</div></div>`
    : riwayat.map(r => `
        <div class="riwayat-item">
          <div class="ri-icon minus"><i class="fas fa-gift"></i></div>
          <div>
            <div class="ri-desc">Tukar poin → Diskon Rp ${fmt(r.nilaiDiskon)}</div>
            <div class="ri-date">${r.tgl ? new Date(r.tgl).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}) : '-'}</div>
          </div>
          <div class="ri-poin minus">−${fmt(r.poinDipakai)} pts</div>
        </div>
      `).join('');

  const inisial = (c.nama||'?')[0].toUpperCase();

  document.getElementById('card-wrap').innerHTML = `
    <div class="cust-card">

      <!-- Header -->
      <div class="card-header">
        <div class="cust-avatar">${inisial}</div>
        <div>
          <div class="cust-name">${c.nama || '-'}</div>
          <div class="cust-phone">${c.phone || 'Tidak ada nomor'}</div>
        </div>
        <div class="tier-badge" style="background:${tier.bg};color:${tier.color};">
          ${tier.icon} ${tier.nama}
        </div>
      </div>

      <!-- Poin besar -->
      <div class="poin-section">
        <div class="poin-label">Total Poin</div>
        <div class="poin-angka" id="poin-display">${fmt(poin)}</div>
        <div class="poin-sub">poin reward aktif</div>
      </div>

      <!-- Progress tier -->
      <div class="tier-progress-wrap">
        <div class="tier-row">
          <span class="tier-from" style="color:${tier.color};">${tier.icon} ${tier.nama}</span>
          ${tierNext ? `<span class="tier-to" style="color:${tierNext.color};">${tierNext.icon} ${tierNext.nama}</span>` : ''}
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="prog-fill" style="width:0%;background:linear-gradient(90deg,${tier.color},${tierNext ? tierNext.color : tier.color});"></div>
        </div>
        <div class="tier-msg">${progressMsg}</div>
      </div>

      <!-- Info konversi -->
      <div class="konversi-box">
        <div class="konv-title"><i class="fas fa-exchange-alt" style="margin-right:6px;"></i>Nilai Penukaran Poin</div>
        <div class="konv-row">
          <span class="konv-lbl">Poin yang bisa ditukar</span>
          <span class="konv-val">${fmt(poinTukar)} pts</span>
        </div>
        <div class="konv-row">
          <span class="konv-lbl">Nilai diskon didapat</span>
          <span class="konv-diskon">Rp ${fmt(nilaiDiskon)}</span>
        </div>
        ${poin % 100 > 0 ? `<div class="konv-row">
          <span class="konv-lbl">Sisa poin (tidak ditukar)</span>
          <span class="konv-val" style="color:#64748b;">${fmt(poin % 100)} pts</span>
        </div>` : ''}
        <div class="konv-note">100 poin = Rp ${fmt(nilaiPer100)} diskon</div>
      </div>

      <!-- Tombol tukar -->
      <button class="btn-tukar" id="btn-tukar" onclick="tukarPoin()" ${bisaTukar ? '' : 'disabled'}>
        ${bisaTukar
          ? `<i class="fas fa-gift"></i> Tukar ${fmt(poinTukar)} Poin → Diskon Rp ${fmt(nilaiDiskon)}`
          : `<i class="fas fa-lock"></i> Minimal 100 poin untuk ditukar`
        }
      </button>

      <!-- Riwayat penukaran -->
      <div class="riwayat-wrap">
        <div class="riwayat-title"><i class="fas fa-history" style="margin-right:6px;"></i>Riwayat Penukaran</div>
        ${riwayatHtml}
      </div>

    </div>
  `;

  // Animasi progress bar
  setTimeout(() => {
    const el = document.getElementById('prog-fill');
    if (el) el.style.width = progressPct + '%';
  }, 100);
}

/* ─────────────────────────────────────────────
   TUKAR POIN
───────────────────────────────────────────── */
async function tukarPoin() {
  const c = pelangganList.find(x => x.id === selectedId);
  if (!c) return;
  const poin       = Number(c.poin || 0);
  const nilaiPer100 = 1000;
  const nilaiDiskon = Math.floor(poin / 100) * nilaiPer100;
  const poinDipakai = Math.floor(poin / 100) * 100;
  const sisaPoin    = poin % 100;

  const res = await Swal.fire({
    title: 'Konfirmasi Penukaran',
    html: `
      <div style="text-align:center;padding:8px 0;">
        <div style="font-size:36px;font-weight:900;background:linear-gradient(135deg,#a78bfa,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">${fmt(poinDipakai)}</div>
        <div style="font-size:11px;color:#94a3b8;font-weight:700;margin-bottom:14px;">poin akan ditukar</div>
        <div style="background:rgba(124,58,237,0.08);border:1.5px solid rgba(124,58,237,0.2);border-radius:16px;padding:16px;">
          <div style="font-size:13px;font-weight:900;color:#a78bfa;">Kamu mendapatkan diskon</div>
          <div style="font-size:28px;font-weight:900;color:#fff;margin:6px 0;">Rp ${fmt(nilaiDiskon)}</div>
          ${sisaPoin > 0 ? `<div style="font-size:10px;color:#64748b;font-weight:700;">Sisa ${fmt(sisaPoin)} poin tetap tersimpan</div>` : ''}
        </div>
        <div style="font-size:10px;color:#ef4444;margin-top:12px;font-weight:700;">
          <i class="fas fa-info-circle" style="margin-right:4px;"></i>
          ${poinDipakai} poin akan di-reset setelah ditukar
        </div>
      </div>`,
    showCancelButton: true,
    confirmButtonText: '✅ Tukar Sekarang',
    cancelButtonText: 'Batal',
    confirmButtonColor: '#7c3aed',
    customClass: { popup: 'swal2-ku' }
  });

  if (!res.isConfirmed) return;

  // Update Firestore
  try {
    document.getElementById('btn-tukar').disabled = true;
    document.getElementById('btn-tukar').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses…';

    const newPoin = sisaPoin;
    const redeemEntry = {
      tgl: new Date().toISOString(),
      poinDipakai,
      nilaiDiskon,
    };

    // Update local list dulu
    const idx = pelangganList.findIndex(x => x.id === selectedId);
    if (idx !== -1) {
      pelangganList[idx].poin = newPoin;
      pelangganList[idx].redeemHistory = [...(pelangganList[idx].redeemHistory || []), redeemEntry];
    }

    if (pelangganMode === 'subcol') {
      // ── Pola lama: sub-koleksi ──
      const ref = window._db.collection('stores').doc(storeId)
        .collection('pelanggan').doc(selectedId);
      await ref.update({
        poin: newPoin,
        redeemHistory: firebase.firestore.FieldValue.arrayUnion(redeemEntry),
        updatedAt: new Date().toISOString()
      });

    } else if (pelangganMode === 'array') {
      // ── Pola index.html: pelanggan = array di dokumen stores/{storeId} ──
      const docRef = window._db.collection('stores').doc(storeId);
      const docSnap = await docRef.get();
      const docData = docSnap.data();
      // Cari di root atau dalam field db
      const inDb = docData.db && Array.isArray(docData.db.pelanggan);
      const arrKey = inDb ? 'db.pelanggan' : 'pelanggan';
      const arr = inDb ? (docData.db.pelanggan || []) : (docData.pelanggan || []);
      const updatedArr = arr.map(p => {
        const pid = p.id || '';
        if (pid !== selectedId) return p;
        return {
          ...p,
          poin: newPoin,
          redeemHistory: [...(p.redeemHistory || []), redeemEntry],
          updatedAt: new Date().toISOString()
        };
      });
      if (inDb) {
        await docRef.update({ 'db.pelanggan': updatedArr });
      } else {
        await docRef.update({ pelanggan: updatedArr });
      }

    } else if (pelangganMode === 'user_stores') {
      // ── Pola multi-toko: user_stores/{storeId} ──
      const docRef = window._db.collection('user_stores').doc(storeId);
      const docSnap = await docRef.get();
      const docData = docSnap.data();
      const inDb = docData.db && Array.isArray(docData.db.pelanggan);
      const arr = inDb ? (docData.db.pelanggan || []) : (docData.pelanggan || []);
      const updatedArr = arr.map(p => {
        if ((p.id || '') !== selectedId) return p;
        return {
          ...p,
          poin: newPoin,
          redeemHistory: [...(p.redeemHistory || []), redeemEntry],
          updatedAt: new Date().toISOString()
        };
      });
      if (inDb) {
        await docRef.update({ 'db.pelanggan': updatedArr });
      } else {
        await docRef.update({ pelanggan: updatedArr });
      }
    }

    showToast(`Tukar berhasil! Diskon Rp ${fmt(nilaiDiskon)} siap dipakai`, '🎁');
    renderKartu(pelangganList[idx !== -1 ? idx : 0]);

  } catch (err) {
    console.error(err);
    Swal.fire({ icon:'error', title:'Gagal', text:'Terjadi kesalahan: '+err.message, customClass:{popup:'swal2-ku'} });
    document.getElementById('btn-tukar').disabled = false;
  }
}

/* ─────────────────────────────────────────────
   INIT
───────────────────────────────────────────── */
(async () => {
  await waitFirebase();

  // Tunggu auth (coba pakai session yg sudah ada di index.html)
  window._auth.onAuthStateChanged(async user => {
    if (!user) {
      // Belum login — tampilkan pesan
      document.getElementById('card-wrap').innerHTML = `
        <div class="empty-state" style="margin-top:40px;">
          <div class="empty-icon">🔒</div>
          <div class="empty-text">Silakan login terlebih dahulu<br>dari halaman utama KonterKU</div>
        </div>`;
      return;
    }
    storeId = await getStoreId(user.uid);
    if (!storeId) {
      document.getElementById('card-wrap').innerHTML = `
        <div class="empty-state" style="margin-top:40px;">
          <div class="empty-icon">⚠️</div>
          <div class="empty-text">Toko tidak ditemukan untuk akun ini</div>
        </div>`;
      return;
    }
    await loadPelanggan(storeId);
    // Cek apakah ada ?id= di URL (deep link dari halaman utama)
    const urlParams = new URLSearchParams(window.location.search);
    const preId = urlParams.get('id');
    if (preId) {
      const c = pelangganList.find(x => x.id === preId);
      if (c) pilihPelanggan(preId);
    }
  });
})();
</script>
